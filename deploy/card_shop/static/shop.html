<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡密商城</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #0f1923; color: #c9d1d9; min-height: 100vh; }

/* Header */
.header { background: linear-gradient(135deg, #1a2332, #0d1117); padding: 12px 24px; border-bottom: 2px solid #2d4a6e; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 20px; color: #e6f1ff; cursor: pointer; }
.header .user-bar { display: flex; gap: 12px; align-items: center; }
.header .balance { background: #1b3a1b; color: #3fb950; padding: 6px 14px; border-radius: 16px; font-weight: bold; font-size: 14px; }

/* Nav */
.nav { display: flex; gap: 6px; padding: 8px 24px; background: #161b22; border-bottom: 1px solid #30363d; flex-wrap: wrap; }
.nav-btn { padding: 8px 16px; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.nav-btn:hover { background: #30363d; border-color: #58a6ff; }
.nav-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.nav-btn.admin-only { border-color: #d2991d; color: #d2991d; }

/* Main */
.main { max-width: 1200px; margin: 0 auto; padding: 20px 24px; }

/* Cards */
.card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
.card h3 { font-size: 15px; color: #58a6ff; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #21262d; }

/* Product Grid */
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.product-card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; cursor: pointer; transition: all 0.2s; }
.product-card:hover { border-color: #58a6ff; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(88,166,255,0.1); }
.product-card .p-name { font-size: 16px; color: #e6f1ff; margin-bottom: 8px; }
.product-card .p-desc { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
.product-card .p-meta { display: flex; justify-content: space-between; align-items: center; }
.product-card .p-price { font-size: 22px; font-weight: bold; color: #3fb950; }
.product-card .p-stock { font-size: 12px; color: #8b949e; }

/* Buttons */
.btn { padding: 8px 18px; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; background: #21262d; color: #c9d1d9; }
.btn:hover { background: #30363d; border-color: #58a6ff; }
.btn-primary { background: #238636; border-color: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-danger { background: #da3633; border-color: #da3633; color: #fff; }
.btn-danger:hover { background: #e5534b; }
.btn-sm { padding: 4px 12px; font-size: 12px; }
.btn-block { display: block; width: 100%; }

/* Form */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: #c9d1d9; font-size: 14px; }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: #58a6ff; outline: none; }
.form-group textarea { resize: vertical; min-height: 120px; font-family: 'Consolas', monospace; font-size: 12px; }

/* Auth box */
.auth-box { max-width: 380px; margin: 80px auto; }
.auth-box .tabs { display: flex; gap: 4px; margin-bottom: 20px; }
.auth-box .tabs button { flex: 1; }

/* Table */
.table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table th, .table td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #21262d; }
.table th { color: #58a6ff; }
.table tr:hover { background: #1c2128; }

/* QR code in recharge modal */
.qr-section { text-align: center; margin: 16px 0; padding: 16px; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; }
.qr-title { color: #e6f1ff; font-size: 14px; font-weight: bold; margin: 0 0 4px; }
.qr-hint { color: #8b949e; font-size: 11px; margin: 0 0 12px; }
.qr-row { display: flex; gap: 16px; justify-content: center; }
.qr-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.qr-img { width: 150px; height: 150px; border-radius: 8px; border: 2px solid #30363d; user-select: none; pointer-events: none; object-fit: cover; }
.qr-label { color: #8b949e; font-size: 12px; }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
.modal-overlay.show { display: flex; }
.modal-box { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal-box h3 { color: #58a6ff; margin-bottom: 16px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

/* Tags & badges */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; }
.tag-green { background: #1b3a1b; color: #3fb950; }
.tag-red { background: #3a1b1b; color: #f85149; }
.tag-yellow { background: #3a351b; color: #d2991d; }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-item { text-align: center; padding: 16px; background: #0d1117; border-radius: 8px; border: 1px solid #21262d; }
.stat-value { font-size: 24px; font-weight: bold; color: #e6f1ff; }
.stat-label { font-size: 11px; color: #8b949e; margin-top: 4px; }

/* Card details */
.card-detail { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; margin: 8px 0; }
.card-detail .field { display: flex; justify-content: space-between; padding: 4px 0; font-size: 13px; font-family: monospace; }
.card-detail .field .val { color: #3fb950; }

/* VIP badges */
.vip-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; margin-left: 4px; }
.vip-normal { background: #21262d; color: #8b949e; }
.vip-vip1 { background: #3a2e1b; color: #cd7f32; }
.vip-vip2 { background: #1a2332; color: #c0c0c0; }
.vip-svip { background: #3a351b; color: #ffd700; }

/* Discount info */
.discount-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #3a351b; color: #d2991d; margin-top: 4px; }
.discount-row { display: flex; gap: 8px; align-items: flex-end; margin-top: 8px; }

/* Card detail for orders */
.order-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; margin-bottom: 12px; cursor: pointer; }
.order-card:hover { border-color: #58a6ff; }
.order-card .order-header { display: flex; justify-content: space-between; align-items: center; }
.order-cards { margin-top: 12px; border-top: 1px solid #21262d; padding-top: 12px; }
.order-cards.hidden { display: none; }

/* Settings */
.setting-row { display: flex; gap: 8px; align-items: flex-end; }

/* Order tabs */
.order-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid #30363d; }
.order-tab { padding: 10px 24px; cursor: pointer; color: #8b949e; font-size: 14px; border: none; background: none; transition: all 0.2s; position: relative; }
.order-tab:hover { color: #c9d1d9; }
.order-tab.active { color: #58a6ff; font-weight: bold; }
.order-tab.active::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:2px; background:#58a6ff; }
.order-tab .count { font-size: 11px; margin-left: 4px; padding: 1px 6px; border-radius: 8px; background: #21262d; }
.order-tab.active .count { background: #1f6feb33; color: #58a6ff; }

/* Search bar */
.search-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.search-bar input { flex: 1; max-width: 360px; padding: 8px 12px; border: 1px solid #30363d; border-radius: 6px; background: #0d1117; color: #c9d1d9; font-size: 13px; }
.search-bar input:focus { border-color: #58a6ff; outline: none; }

/* Order table */
.order-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.order-table th, .order-table td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #21262d; vertical-align: middle; }
.order-table th { color: #8b949e; font-weight: 600; font-size: 12px; white-space: nowrap; }
.order-table tr:hover { background: #1c2128; }
.order-status { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
.status-completed { background: #1b3a1b; color: #3fb950; }
.status-unfinished { background: #3a351b; color: #d2991d; }

/* Action links */
.action-links { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.action-links a { color: #58a6ff; text-decoration: none; font-size: 12px; cursor: pointer; }
.action-links a:hover { text-decoration: underline; }
.action-links .divider { color: #30363d; font-size: 12px; }
.btn-qq { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #12b7f5; color: #fff !important; text-decoration: none !important; cursor: pointer; }
.btn-qq:hover { background: #0ea5d3; text-decoration: none !important; }

/* Order detail */
.order-detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.order-detail-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
.order-detail-meta .meta-item { background: #0d1117; padding: 12px; border-radius: 6px; border: 1px solid #21262d; }
.order-detail-meta .meta-label { font-size: 11px; color: #8b949e; margin-bottom: 4px; }
.order-detail-meta .meta-value { font-size: 15px; font-weight: bold; color: #e6f1ff; }

/* Card list */
.card-list { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
.card-list-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #1c2128; border-bottom: 1px solid #30363d; }
.card-list-body { padding: 16px; max-height: 500px; overflow-y: auto; }
.card-list-item { padding: 8px 12px; font-family: 'Consolas', 'Courier New', monospace; font-size: 13px; border-bottom: 1px solid #21262d; display: flex; align-items: flex-start; gap: 8px; }
.card-list-item:last-child { border-bottom: none; }
.card-list-item .idx { color: #8b949e; min-width: 28px; text-align: right; user-select: none; }
.card-list-item .content { color: #c9d1d9; word-break: break-all; flex: 1; }
.card-list-item .copy-one { color: #58a6ff; cursor: pointer; font-size: 11px; user-select: none; opacity: 0; transition: opacity 0.2s; }
.card-list-item:hover .copy-one { opacity: 1; }

/* Toolbar */
.toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.toolbar .btn svg { width: 14px; height: 14px; vertical-align: -2px; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: #8b949e; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* Pagination */
.pagination { display: flex; gap: 6px; justify-content: center; margin-top: 16px; align-items: center; }
.pagination .page-btn { padding: 6px 12px; border: 1px solid #30363d; border-radius: 4px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 12px; }
.pagination .page-btn:hover { border-color: #58a6ff; }
.pagination .page-btn.active { background: #1f6feb; border-color: #1f6feb; }
.pagination .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.pagination .page-info { font-size: 12px; color: #8b949e; padding: 0 8px; }

/* Bar chart (CSS only) */
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 160px; padding: 4px 0; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; }
.bar-col .bar { width: 100%; max-width: 30px; background: linear-gradient(180deg, #58a6ff, #1f6feb); border-radius: 4px 4px 0 0; min-height: 2px; transition: height 0.3s; position: relative; }
.bar-col .bar:hover { background: linear-gradient(180deg, #79c0ff, #388bfd); }
.bar-col .bar-val { font-size: 10px; color: #8b949e; margin-bottom: 2px; white-space: nowrap; }
.bar-col .bar-label { font-size: 10px; color: #8b949e; margin-top: 4px; white-space: nowrap; transform: rotate(-45deg); transform-origin: center; }

/* Summary cards */
.summary-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.summary-card { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 16px; text-align: center; }
.summary-card .sc-value { font-size: 28px; font-weight: bold; }
.summary-card .sc-label { font-size: 11px; color: #8b949e; margin-top: 4px; }

/* Balance tiers */
.balance-tiers { display: flex; gap: 4px; margin-top: 8px; }
.balance-tier { flex: 1; text-align: center; background: #161b22; border-radius: 6px; padding: 8px 4px; border: 1px solid #21262d; }
.balance-tier .bt-count { font-size: 18px; font-weight: bold; color: #e6f1ff; }
.balance-tier .bt-range { font-size: 10px; color: #8b949e; margin-top: 2px; }

/* Checkboxes */
.check-cell { width: 32px; text-align: center; }
input[type="checkbox"].row-check { width: 16px; height: 16px; cursor: pointer; accent-color: #1f6feb; }

/* Batch toolbar */
.batch-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.batch-toolbar select, .batch-toolbar input { padding: 6px 10px; border: 1px solid #30363d; border-radius: 4px; background: #0d1117; color: #c9d1d9; font-size: 12px; }
.batch-toolbar input[type="number"] { width: 80px; }
.batch-toolbar input[type="text"] { width: 120px; }

/* Mini modal */
.mini-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center; }
.mini-modal.show { display: flex; }
.mini-modal-box { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; max-width: 380px; width: 90%; }
.mini-modal-box h4 { color: #58a6ff; margin-bottom: 12px; }

/* Low stock alert */
.low-stock-alert { border: 1px solid #d2991d; background: #3a351b; }
.low-stock-alert .sc-value { color: #f0883e; }

/* Utilities */
.hidden { display: none !important; }
.text-center { text-align: center; }
.mt-16 { margin-top: 16px; }
.mb-16 { margin-bottom: 16px; }
.gap-8 { gap: 8px; }
.flex { display: flex; }
.flex-wrap { flex-wrap: wrap; }
.alert { padding: 12px; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
.alert-success { background: #1b3a1b; color: #3fb950; border: 1px solid #238636; }
.alert-error { background: #3a1b1b; color: #f85149; border: 1px solid #da3633; }
.alert-info { background: #1a2332; color: #58a6ff; border: 1px solid #1f6feb; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1 onclick="switchTab('home')">🎮 卡密商城 <span style="font-size:11px;color:#8b949e;font-weight:normal;">v2.1</span></h1>
  <div class="user-bar" id="userBar">
    <a href="#" onclick="switchTab('auth')" style="color:#58a6ff;text-decoration:none;">登录</a>
  </div>
</div>

<!-- Nav -->
<div class="nav" id="navBar" style="display:none;">
  <button class="nav-btn active" data-tab="home">🏠 首页</button>
  <button class="nav-btn" data-tab="orders">📦 我的订单</button>
  <button class="nav-btn" data-tab="records">📋 记录</button>
  <button class="nav-btn" data-tab="settings">⚙️ 设置</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-dashboard">📊 仪表盘</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-cards">💳 充值卡</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-products">📦 商品</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-inventory">🗄️ 库存</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-users">👥 用户</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-promo">🏷️ 优惠码</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-discounts">📉 折扣</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-vip">👑 VIP定价</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-config">⚙️ 站点配置</button>
  <button class="nav-btn admin-only hidden" data-tab="admin-audit">📝 审计日志</button>
  <button class="nav-btn" onclick="logout()" style="margin-left:auto;">🚪 退出</button>
</div>

<!-- Main Content -->
<div class="main" id="mainContent"></div>

<!-- Redeem Modal -->
<div class="modal-overlay" id="redeemModal">
  <div class="modal-box">
    <h3>💳 充值卡密兑换</h3>
    <div id="redeemMsg"></div>
    <div class="form-group">
      <label>卡号</label>
      <input type="text" id="redeemCardNo" placeholder="输入卡号">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="text" id="redeemCardPw" placeholder="输入密码">
    </div>
    <div class="qr-section">
      <p class="qr-title">📱 购卡服务号</p>
      <p class="qr-hint">联系客服购买充值卡密 · 长按保存</p>
      <div class="qr-row">
        <div class="qr-item">
          <img src="/static/wx_qrcode.jpg" alt="微信客服" class="qr-img" draggable="false" oncontextmenu="return false">
          <span class="qr-label">微信</span>
        </div>
        <div class="qr-item">
          <img src="/static/qq_qrcode.jpg" alt="QQ客服" class="qr-img" draggable="false" oncontextmenu="return false">
          <span class="qr-label">QQ</span>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeRedeem()">取消</button>
      <button class="btn btn-primary" onclick="doRedeem()">立即充值</button>
    </div>
  </div>
</div>

<!-- Buy Modal -->
<div class="modal-overlay" id="buyModal">
  <div class="modal-box">
    <h3>🛒 下单购买</h3>
    <div id="buyInfo"></div>
    <div class="form-group">
      <label>购买数量</label>
      <input type="number" id="buyQty" value="1" min="1" oninput="updateBuyTotal()" onchange="updateBuyTotal()">
    </div>
    <div id="discountInfo" style="margin-top:8px;"></div>
    <div id="buyError" style="display:none;"></div>
    <!-- 支付确认区（点击创建订单后出现） -->
    <div id="payConfirm" style="display:none;margin-top:16px;padding:14px;background:#0d1117;border:1px solid #238636;border-radius:8px;">
      <div id="payDetail" style="font-size:13px;color:#c9d1d9;"></div>
      <div style="border-top:1px solid #21262d;margin-top:10px;padding-top:10px;display:flex;justify-content:space-between;align-items:center;">
        <span style="color:#e6f1ff;font-size:15px;font-weight:bold;">应付: <span id="payFinal" style="color:#3fb950;">0</span> 元</span>
        <span style="color:#8b949e;font-size:11px;">余额: <span id="payBalance">0</span> 元</span>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="btn" onclick="closeBuy()">取消</button>
      <button class="btn btn-primary" id="buyBtn" onclick="stepCreateOrder()">创建订单</button>
    </div>
    <div class="modal-actions" id="payActions" style="display:none;margin-top:8px;">
      <button class="btn btn-primary btn-block" id="payBtn" onclick="doPay()">确认支付</button>
    </div>
  </div>
</div>

<!-- Password Modal -->
<div class="modal-overlay" id="pwdModal">
  <div class="modal-box">
    <h3>🔑 修改密码</h3>
    <div id="pwdMsg"></div>
    <div class="form-group"><label>原密码</label><input type="password" id="oldPwd"></div>
    <div class="form-group"><label>新密码</label><input type="password" id="newPwd1" oninput="checkPwdStr()"></div>
    <div class="form-group"><label>确认新密码</label><input type="password" id="newPwd2" oninput="checkPwdStr()"></div>
    <span id="pwdHint" style="font-size:11px;color:#8b949e;display:block;margin-top:-10px;margin-bottom:8px;"></span>
    <div class="modal-actions">
      <button class="btn" onclick="closePwd()">取消</button>
      <button class="btn btn-primary" onclick="doChangePwd()">确认修改</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════
let currentUser = null;
let currentTab = 'home';
let buyProduct = null;
let buyPromoCode = null;
let buyPromoDiscount = 0;
let buyPriceReady = true;  // 价格计算中禁止购买

const API = (path, opts = {}) => {
  const headers = {'Content-Type': 'application/json'};
  const token = localStorage.getItem('shop_token');
  if (token) headers['Authorization'] = `Bearer ${token}`;
  return fetch('/api' + path, {...opts, headers: {...headers, ...(opts.headers||{})}}).then(r => r.json());
};

const VIP_BADGES = {normal:'', vip1:'🥉', vip2:'🥈', svip:'🥇'};
const VIP_CLASSES = {normal:'vip-normal', vip1:'vip-vip1', vip2:'vip-vip2', svip:'vip-svip'};

function updateBalanceDisplay() {
  const el = document.querySelector('.bal-amount');
  if (el) el.textContent = currentUser.balance.toFixed(2);
}

function escapeJs(str) {
  if (!str && str !== 0) return '';
  return String(str).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');
}

function escapeHtml(str) {
  if (!str && str !== 0) return '';
  const s = String(str);
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;');
}

async function init() {

        currentUser = res.user;
        showApp();
        return;

  showAuth();
}

function showAuth() {
  currentUser = null;
  document.getElementById('userBar').innerHTML = '<a href="#" onclick="switchTab(\'auth\')" style="color:#58a6ff;text-decoration:none;">登录</a>';
  document.getElementById('navBar').style.display = 'none';
  document.getElementById('mainContent').innerHTML = `
    <div class="auth-box" id="authBox">
      <div class="tabs">
        <button class="btn btn-primary" onclick="toggleAuth('login')" id="tabLogin">登录</button>
        <button class="btn" onclick="toggleAuth('register')" id="tabReg">注册</button>
      </div>
      <div id="authForm"></div>
      <div id="authMsg"></div>
    </div>`;
  toggleAuth('login');
}

let authMode = 'login';
let verifiedEmail = '';
let sendCooldown = 0;
let sendCooldownTimer = null;
let refInviteCode = '';  // 从URL ?ref= 参数读取的邀请码

function toggleAuth(mode) {
  // 只有真正切换模式时才重置验证状态
  const isSwitching = (authMode !== mode);
  if (isSwitching) {
    verifiedEmail = '';
  }
  authMode = mode;
  document.getElementById('tabLogin').className = mode === 'login' ? 'btn btn-primary' : 'btn';
  document.getElementById('tabReg').className = mode === 'register' ? 'btn btn-primary' : 'btn';
  document.getElementById('authMsg').innerHTML = '';

  if (mode === 'login') {
    document.getElementById('authForm').innerHTML = `
      <div class="form-group"><label style="display:block;">用户名</label><input type="text" id="authUser" placeholder="输入用户名" autocomplete="username" onkeydown="if(event.key==='Enter')doAuth()"></div>
      <div class="form-group"><label style="display:block;">密码</label><input type="password" id="authPass" placeholder="输入密码" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()"></div>
      <button class="btn btn-primary btn-block" onclick="doAuth()">登录</button>`;
  } else {
    // 保留已验证邮箱的视觉提示
    const emailVerifiedHint = verifiedEmail
      ? '<span id="emailVerifyHint" style="font-size:12px;display:block;margin-top:-4px;margin-bottom:8px;color:#3fb950;">✅ 邮箱已验证: ' + verifiedEmail + '</span>'
      : '<span id="emailVerifyHint" style="font-size:12px;display:block;margin-top:-4px;margin-bottom:8px;"></span>';
    document.getElementById('authForm').innerHTML = `
      <div class="form-group"><label style="display:block;">用户名</label><input type="text" id="regUser" placeholder="2-20个字符" autocomplete="username"></div>
      <div class="form-group"><label style="display:block;">密码</label><input type="password" id="regPass" placeholder="8位以上，含字母+数字+符号" autocomplete="new-password" oninput="checkPassStrength()"></div>
      <div class="form-group"><label style="display:block;">确认密码</label><input type="password" id="regPass2" placeholder="再次输入密码" autocomplete="new-password" oninput="checkPassMatch()"></div>
      <span id="passHint" style="font-size:11px;color:#8b949e;display:block;margin-top:-10px;margin-bottom:8px;">需包含大写、小写、数字、符号中至少3种</span>
      <div class="form-group"><label style="display:block;">邀请码 ${refInviteCode ? '<span style="color:#d2991d;font-size:11px;">(已自动填入)</span>' : '<span style="color:#8b949e;font-size:11px;">(选填)</span>'}</label>
        <input type="text" id="regInviteCode" placeholder="如有邀请码请填写" value="${refInviteCode || ''}" ${refInviteCode ? 'readonly style="background:#1c2128;"' : ''}>
      </div>
      <div class="form-group"><label style="display:block;">邮箱</label>
        <div class="flex gap-8" style="align-items:flex-end;">
          <input type="email" id="regEmail" placeholder="用于接收验证码" style="flex:1;" value="${verifiedEmail || ''}" oninput="onEmailChanged()">
          <button class="btn btn-primary btn-sm" onclick="sendVerifyCode()" id="sendCodeBtn">获取验证码</button>
        </div>
      </div>
      <div class="form-group"><label style="display:block;">邮箱验证码</label>
        <div class="flex gap-8" style="align-items:flex-end;">
          <input type="text" id="regCode" placeholder="输入6位验证码" maxlength="6" style="flex:1;">
          <button class="btn btn-sm" onclick="verifyEmailCode()" id="verifyBtn">验证</button>
        </div>
      </div>
      ${emailVerifiedHint}
      <button class="btn btn-primary btn-block" onclick="doRegister()" id="regSubmitBtn">注册</button>`;
  }
}

function onEmailChanged() {
  // 如果用户改了邮箱，清除旧的验证状态
  const currentEmail = document.getElementById('regEmail').value.trim();
  if (verifiedEmail && currentEmail !== verifiedEmail) {
    verifiedEmail = '';
    const hint = document.getElementById('emailVerifyHint');
    if (hint) { hint.innerHTML = ''; hint.style.color = ''; }
    const verifyBtn = document.getElementById('verifyBtn');
    if (verifyBtn) { verifyBtn.textContent = '验证'; verifyBtn.disabled = false; }
  }
}

function checkPassStrength() {
  const p = document.getElementById('regPass').value;
  const hint = document.getElementById('passHint');
  let types = 0;
  if (/[a-z]/.test(p)) types++;
  if (/[A-Z]/.test(p)) types++;
  if (/[0-9]/.test(p)) types++;
  if (/[^a-zA-Z0-9]/.test(p)) types++;
  if (p.length < 8) {
    hint.innerHTML = '❌ 至少8个字符'; hint.style.color = '#f85149';
  } else if (types < 3) {
    hint.innerHTML = `⚠️ 已包含 ${types}/3 种字符类型（还需${3-types}种）`; hint.style.color = '#d2991d';
  } else {
    hint.innerHTML = '✅ 密码强度合格'; hint.style.color = '#3fb950';
  }
}

function checkPassMatch() {
  const p1 = document.getElementById('regPass').value;
  const p2 = document.getElementById('regPass2').value;
  const hint = document.getElementById('passHint');
  if (p2 && p1 !== p2) {
    hint.innerHTML = '❌ 两次密码不一致'; hint.style.color = '#f85149';
  } else if (p1.length >= 8) {
    checkPassStrength();
  }
}

function startCooldown(sec = 60) {
  const btn = document.getElementById('sendCodeBtn');
  if (!btn) return;
  sendCooldown = sec;
  btn.disabled = true;
  if (sendCooldownTimer) clearInterval(sendCooldownTimer);
  sendCooldownTimer = setInterval(() => {
    sendCooldown--;
    if (sendCooldown <= 0) {
      clearInterval(sendCooldownTimer); sendCooldownTimer = null;
      btn.textContent = '获取验证码'; btn.disabled = false;
      btn.style.background = ''; btn.style.borderColor = '';
    } else {
      btn.textContent = `${sendCooldown}s后重试`;
    }
  }, 1000);
}

async function sendVerifyCode() {
  if (sendCooldown > 0) return;
  const emailEl = document.getElementById('regEmail');
  if (!emailEl) return;
  const email = emailEl.value.trim();
  if (!email || email.indexOf('@') < 0) { showMsg('authMsg', '请输入正确的邮箱地址', 'error'); return; }
  const btn = document.getElementById('sendCodeBtn');
  if (btn) { btn.disabled = true; btn.textContent = '发送中...'; }

  let res;
  try {
    res = await API('/shop/auth/send_code', {method:'POST', body:JSON.stringify({email})});
  } catch (e) {
    showMsg('authMsg', '网络错误，请重试', 'error');
    if (btn) { btn.disabled = false; btn.textContent = '获取验证码'; }
    return;
  }

  if (res && res.status === 'ok') {
    showMsg('authMsg', res.message, 'success');
    if (btn) { btn.textContent = '已发送 ✅'; btn.style.background = '#1b3a1b'; btn.style.borderColor = '#238636'; }
    startCooldown(60);
  } else {
    showMsg('authMsg', (res && res.detail) || '发送失败，请检查邮箱地址', 'error');
    if (btn) { btn.disabled = false; btn.textContent = '获取验证码'; }
  }
}

async function verifyEmailCode() {
  const emailEl = document.getElementById('regEmail');
  const codeEl = document.getElementById('regCode');
  if (!emailEl || !codeEl) return;
  const email = emailEl.value.trim();
  const code = codeEl.value.trim();
  if (!email || email.indexOf('@') < 0) { showMsg('authMsg', '请先输入正确的邮箱地址', 'error'); return; }
  if (!code || code.length < 4) { showMsg('authMsg', '请输入验证码', 'error'); return; }

  let res;
  try {
    res = await API('/shop/auth/verify_email', {method:'POST', body:JSON.stringify({email, code})});
  } catch (e) {
    showMsg('authMsg', '网络错误，请重试', 'error');
    return;
  }

  const hint = document.getElementById('emailVerifyHint');
  if (!hint) return;
  if (res && res.status === 'ok') {
    verifiedEmail = email;
    hint.innerHTML = '✅ 邮箱验证通过: ' + email; hint.style.color = '#3fb950';
    const verifyBtn = document.getElementById('verifyBtn');
    const sendBtn = document.getElementById('sendCodeBtn');
    if (verifyBtn) { verifyBtn.textContent = '已验证 ✅'; verifyBtn.disabled = true; }
    if (sendBtn) {
      sendBtn.textContent = '已发送 ✅'; sendBtn.disabled = true;
      sendBtn.style.background = '#1b3a1b'; sendBtn.style.borderColor = '#238636';
    }
    // 注册按钮可用
    const regBtn = document.getElementById('regSubmitBtn');
    if (regBtn) { regBtn.disabled = false; regBtn.style.opacity = '1'; }
  } else {
    hint.innerHTML = '❌ ' + ((res && res.detail) || '验证失败，请检查验证码是否正确'); hint.style.color = '#f85149';
    verifiedEmail = '';
  }
}

async function doRegister() {
  const username = document.getElementById('regUser').value.trim();
  const password = document.getElementById('regPass').value;
  const password2 = document.getElementById('regPass2').value;
  const emailEl = document.getElementById('regEmail');
  const currentEmail = emailEl ? emailEl.value.trim() : '';

  // 校验用户名
  if (!username || username.length < 2) { showMsg('authMsg', '用户名至少2个字符', 'error'); return; }
  if (username.length > 20) { showMsg('authMsg', '用户名最多20个字符', 'error'); return; }

  // 校验密码强度
  if (password.length < 8) { showMsg('authMsg', '密码至少8位', 'error'); return; }
  let types = 0;
  if (/[a-z]/.test(password)) types++;
  if (/[A-Z]/.test(password)) types++;
  if (/[0-9]/.test(password)) types++;
  if (/[^a-zA-Z0-9]/.test(password)) types++;
  if (types < 3) { showMsg('authMsg', '密码需包含大写字母、小写字母、数字、符号中至少3种', 'error'); return; }

  // 校验两次密码一致
  if (password !== password2) { showMsg('authMsg', '两次密码不一致', 'error'); return; }

  // 校验邮箱已验证（双重检查：变量 + 与当前输入一致）
  if (!verifiedEmail) { showMsg('authMsg', '请先验证邮箱（点击验证码旁的"验证"按钮）', 'error'); return; }
  if (verifiedEmail !== currentEmail) {
    showMsg('authMsg', '邮箱已更改，请重新验证新邮箱', 'error');
    verifiedEmail = '';
    return;
  }

  let res;
  try {
    const inviteCodeEl = document.getElementById('regInviteCode');
    const invite_code = inviteCodeEl ? inviteCodeEl.value.trim().toUpperCase() : '';
    res = await API('/shop/auth/register', {method:'POST', body:JSON.stringify({username, password, email: verifiedEmail, invite_code})});
  } catch (e) {
    showMsg('authMsg', '网络错误，请重试', 'error');
    return;
  }
  if (res && res.status === 'ok') {
    showMsg('authMsg', '注册成功！正在跳转登录...', 'success');
    setTimeout(() => toggleAuth('login'), 1500);
  } else {
    showMsg('authMsg', (res && res.detail) || '注册失败，请重试', 'error');
  }
}

async function doAuth() {
  const username = document.getElementById('authUser').value.trim();
  const password = document.getElementById('authPass').value;
  if (!username || !password) { showMsg('authMsg', '请填写用户名和密码', 'error'); return; }

  let res;
  try {
    res = await API('/shop/auth/login', {method:'POST', body:JSON.stringify({username, password})});
  } catch (e) {
    showMsg('authMsg', '网络连接失败，请检查网络后重试', 'error');
    return;
  }

  if (res && res.status === 'ok' && res.token) {
    localStorage.setItem('shop_token', res.token);
    currentUser = res.user;
    showApp();
  } else {
    const detail = (res && res.detail) || '登录失败';
    // 区分不同的错误类型
    if (detail.includes('频繁') || detail.includes('锁定') || detail.includes('秒后')) {
      showMsg('authMsg', '⏳ ' + detail, 'error');
    } else {
      showMsg('authMsg', detail, 'error');
    }
  }
}

async function logout() {
  try { await API('/shop/auth/logout', {method:'POST'}); } catch(e) {}
  localStorage.removeItem('shop_token');
  currentUser = null;
  showAuth();
}

function showMsg(id, text, type) {
  document.getElementById(id).innerHTML = `<div class="alert alert-${type}">${text}</div>`;
}

function showApp() {
  const ub = document.getElementById('userBar');
  const vl = currentUser.vip_level || 'normal';
  const badge = VIP_BADGES[vl] || '';
  const vcls = VIP_CLASSES[vl] || '';
  const vipTag = vl !== 'normal' ? `<span class="vip-badge ${vcls}">${badge} ${vl.toUpperCase()}</span>` : '';
  ub.innerHTML = `
    <span class="balance">💰 <span class="bal-amount">${currentUser.balance.toFixed(2)}</span> 元${vl !== 'normal' ? ' <span class="vip-badge ' + vcls + '">' + badge + ' ' + vl.toUpperCase() + '</span>' : ''}</span>
    <button class="btn btn-sm btn-primary" onclick="openRedeem()">💳 充值</button>
    <span style="color:#8b949e;font-size:13px;">👤 ${currentUser.username}${currentUser.is_admin?' <span style="color:#d2991d;">[管理]</span>':''}</span>`;
  document.getElementById('navBar').style.display = 'flex';

  // Admin tabs
  const adminEls = document.querySelectorAll('.admin-only');
  adminEls.forEach(el => el.classList.toggle('hidden', !currentUser.is_admin));

  // Nav clicks
  document.querySelectorAll('.nav-btn[data-tab]').forEach(btn => {
    btn.onclick = () => switchTab(btn.dataset.tab);
  });

  switchTab('home');
}

function switchTab(tab) {
  if (tab === 'auth') { showAuth(); return; }
  if (!currentUser) { showAuth(); return; }
  currentTab = tab;
  document.querySelectorAll('.nav-btn[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  const mc = document.getElementById('mainContent');

  switch (tab) {
    case 'home': renderHome(); break;
    case 'orders': renderOrders(); break;
    case 'records': renderRecords(); break;
    case 'settings': renderSettings(); break;
    case 'admin-dashboard': renderAdminDashboard(); break;
    case 'admin-cards': renderAdminCards(); break;
    case 'admin-products': renderAdminProducts(); break;
    case 'admin-inventory': renderAdminInventory(); break;
    case 'admin-users': renderAdminUsers(); break;
    case 'admin-promo': renderAdminPromo(); break;
    case 'admin-discounts': renderAdminDiscounts(); break;
    case 'admin-vip': renderAdminVip(); break;
    case 'admin-config': renderAdminConfig(); break;
    case 'admin-audit': renderAdminAudit(); break;
  }
}

async function renderHome() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div class="loading" style="text-align:center;padding:40px;color:#8b949e;">加载中...</div>';

  const [prodRes, vipMap] = await Promise.all([
    API('/shop/products'),
    fetchVipPriceMap(),
  ]);

  const products = prodRes.products || [];
  let html = '<h3 style="color:#58a6ff;margin-bottom:16px;">🛍️ 全部商品</h3>';
  if (!products.length) {
    html += '<p style="color:#8b949e;">暂无商品</p>';
  } else {
    html += '<div class="product-grid">';
    products.forEach(p => {
      const stock = p.available || 0;
      const vipPrice = vipMap[p.id] || 0;
      let priceHtml;
      if (vipPrice > 0) {
        priceHtml = `<span class="p-price" style="color:#ffd700;">¥${vipPrice.toFixed(2)}</span>
          <span style="font-size:11px;color:#8b949e;text-decoration:line-through;margin-left:4px;">¥${p.price.toFixed(2)}</span>`;
      } else {
        priceHtml = `<span class="p-price">¥${p.price.toFixed(2)}</span>`;
      }
      html += `
        <div class="product-card" onclick="openBuy(${p.id}, '${p.name.replace(/'/g,"\\'")}', ${p.price}, ${stock})">
          <div class="p-name">${escapeHtml(p.name)}</div>
          <div class="p-desc">${escapeHtml(p.description || p.category_name || '')}</div>
          <div class="p-meta">
            ${priceHtml}
            <span class="p-stock">库存: ${stock}</span>
          </div>
        </div>`;
    });
    html += '</div>';
  }
  mc.innerHTML = html;
}

async function fetchVipPriceMap() {
  const map = {};
  if (!currentUser) return map;
  const vl = currentUser.vip_level || 'normal';
  if (vl === 'normal') return map;
  try {
    const res = await API('/shop/vip_prices');
    (res.prices || []).forEach(p => { map[p.product_id] = p.price; });
  } catch(e) {}
  return map;
}

function openRedeem() {

  document.getElementById('redeemModal').classList.add('show');

function closeRedeem() {

}

async function doRedeem() {
  const card_no = document.getElementById('redeemCardNo').value.trim();
  const card_password = document.getElementById('redeemCardPw').value.trim();
  if (!card_no || !card_password) { showMsg('redeemMsg', '请填写卡号和密码', 'error'); return; }
  const res = await API('/shop/redeem', {method:'POST', body:JSON.stringify({card_no, card_password})});

    showMsg('redeemMsg', res.message, 'success');

let buyFinalTotal = 0;

async function openBuy(id, name, price, stock) {
  buyProduct = {id, name, price, stock};
  buyPromoCode = null; buyPromoDiscount = 0;
  buyFinalTotal = 0;
  const vipLevel = currentUser.vip_level || 'normal';
  let displayPrice = price;
  let isVip = false;

  if (vipLevel !== 'normal') {
    try {
      const vpRes = await API(`/shop/vip_price/${id}`);
      if (vpRes.is_vip && vpRes.vip_price > 0) { displayPrice = vpRes.vip_price; isVip = true; }
    } catch(e) {}
  }

  let infoHtml = `<p>商品: <b style="color:#e6f1ff;">${escapeHtml(name)}</b></p>`;
  if (isVip) {
    infoHtml += `<p>VIP价格: <b style="color:#ffd700;">¥${displayPrice.toFixed(2)}</b> <span class="tag tag-yellow">${vipLevel.toUpperCase()}</span></p>`;
  } else {
    infoHtml += `<p>单价: <b style="color:#3fb950;">¥${displayPrice.toFixed(2)}</b></p>`;
  }
  infoHtml += `<p>库存: ${stock}</p>`;

  // Promo input for non-VIP
  if (!isVip) {
    infoHtml += `<div class="discount-row" style="margin-top:8px;"><input type="text" id="promoInput" placeholder="优惠码（选填）" style="flex:1;padding:8px;border:1px solid #30363d;border-radius:6px;background:#0d1117;color:#c9d1d9;font-size:13px;"><button class="btn btn-sm btn-primary" onclick="applyPromo()">验证</button></div><span id="promoHint" style="font-size:12px;display:block;margin-top:4px;"></span>`;
  }

  buyProduct.displayPrice = displayPrice;
  buyProduct.isVip = isVip;

  document.getElementById('buyInfo').innerHTML = infoHtml;
  document.getElementById('buyError').style.display = 'none';
  document.getElementById('buyError').innerHTML = '';
  document.getElementById('payConfirm').style.display = 'none';
  document.getElementById('payActions').style.display = 'none';
  document.getElementById('buyBtn').style.display = '';
  document.getElementById('buyBtn').textContent = '创建订单';
  document.getElementById('buyQty').value = 1;
  document.getElementById('buyQty').max = stock;
  document.getElementById('buyQty').oninput = updateBuyTotal;
  document.getElementById('buyQty').onchange = updateBuyTotal;
  document.getElementById('discountInfo').innerHTML = '';
  updateBuyTotal();
  document.getElementById('buyModal').classList.add('show');
}

function closeBuy() {
  document.getElementById('buyModal').classList.remove('show');
  buyProduct = null; buyFinalTotal = 0;
}

async function updateBuyTotal() {
  buyPriceReady = false;
  const btn = document.getElementById('buyBtn');
  if (btn) { btn.disabled = true; btn.textContent = '计算中...'; }
  try {
    const qty = parseInt(document.getElementById('buyQty').value) || 1;
    let subtotal = (buyProduct.displayPrice || buyProduct.price) * qty;
    let total = subtotal;
    const discDiv = document.getElementById('discountInfo');
    let discountPct = 0;
    if (discDiv && !buyProduct.isVip) {
      const res = await API(`/shop/products/${buyProduct.id}/discount?quantity=${qty}`);
      let html = '';
      if (res.single) html += `<span class="discount-tag">单次满${res.single.min_quantity}件享${res.single.discount_percent}%折扣</span> `;
      if (res.cumulative) html += `<span class="discount-tag">累计满${res.cumulative.min_quantity}件享${res.cumulative.discount_percent}%折扣</span>`;
      discDiv.innerHTML = html;
      discountPct = Math.max(res.single?.discount_percent||0, res.cumulative?.discount_percent||0);
      if (discountPct > 0) total = subtotal * (1 - discountPct / 100);
    }
    total = Math.round(Math.max(0, total - buyPromoDiscount) * 100) / 100;
    buyFinalTotal = total;
    document.getElementById('buyBtn').textContent = `创建订单 ¥${total.toFixed(2)}`;
  } finally {
    buyPriceReady = true;
    if (btn) btn.disabled = false;
  }
}

async function applyPromo() {
  const code = document.getElementById('promoInput').value.trim();
  if (!code) return;
  const qty = parseInt(document.getElementById('buyQty').value) || 1;
  const subtotal = (buyProduct.displayPrice || buyProduct.price) * qty;
  const res = await API('/shop/promo/validate', {method:'POST', body:JSON.stringify({code, order_total: subtotal, product_id: buyProduct.id})});
  const hint = document.getElementById('promoHint');
  if (res.status === 'ok') {
    buyPromoCode = code; buyPromoDiscount = res.discount_amount;
    hint.innerHTML = `✅ -¥${res.discount_amount.toFixed(2)}`; hint.style.color = '#3fb950';
    updateBuyTotal();
  } else {
    hint.innerHTML = '❌ ' + (res.detail||'无效'); hint.style.color = '#f85149';
    buyPromoCode = null; buyPromoDiscount = 0;
    updateBuyTotal();
  }
}

function stepCreateOrder() {
  if (!buyPriceReady) return;
  const qty = parseInt(document.getElementById('buyQty').value) || 1;
  if (qty < 1) return;
  const unitPrice = buyProduct.displayPrice || buyProduct.price;
  const subtotal = unitPrice * qty;

  // 构建支付明细
  let detail = `<div style="margin-bottom:6px;">${escapeHtml(buyProduct.name)} × ${qty}`;
  if (buyProduct.isVip) {
    detail += ` <span style="color:#ffd700;">VIP价 ¥${unitPrice.toFixed(2)}</span>`;
  }
  detail += ` = <b>¥${subtotal.toFixed(2)}</b></div>`;

  if (buyPromoDiscount > 0) {
    detail += `<div style="color:#d2991d;">优惠码 -¥${buyPromoDiscount.toFixed(2)}</div>`;
  }

  document.getElementById('payDetail').innerHTML = detail;
  document.getElementById('payFinal').textContent = buyFinalTotal.toFixed(2);
  document.getElementById('payBalance').textContent = currentUser.balance.toFixed(2);

  // 余额不足红色提示
  if (currentUser.balance < buyFinalTotal) {
    document.getElementById('payBalance').style.color = '#f85149';
  } else {
    document.getElementById('payBalance').style.color = '#8b949e';
  }

  // 隐藏创建订单，显示支付确认 + 支付按钮
  document.getElementById('buyBtn').style.display = 'none';
  document.getElementById('payConfirm').style.display = '';
  document.getElementById('payActions').style.display = '';
  document.getElementById('payBtn').textContent = `确认支付 ¥${buyFinalTotal.toFixed(2)}`;
  document.getElementById('buyError').style.display = 'none';
}

async function doPay() {
  const btn = document.getElementById('payBtn');
  if (btn) { btn.disabled = true; btn.textContent = '支付中...'; }
  const errEl = document.getElementById('buyError');
  errEl.style.display = 'none';
  try {
    const qty = parseInt(document.getElementById('buyQty').value) || 1;
    const body = {product_id: buyProduct.id, quantity: qty};
    if (buyPromoCode) body.promo_code = buyPromoCode;
    const res = await API('/shop/orders', {method:'POST', body:JSON.stringify(body)});
    if (res.status === 'ok') {
      currentUser.balance = res.balance;
      updateBalanceDisplay();
      closeBuy();
      currentTab = 'orders';
      await goToOrderDetail(res.order.id);
    } else {
      errEl.innerHTML = '❌ ' + (res.detail || '支付失败');
      errEl.style.display = '';
      errEl.style.color = '#f85149';
    }
  } catch(e) {
    errEl.innerHTML = '❌ 网络错误，请重试';
    errEl.style.display = '';
    errEl.style.color = '#f85149';
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '确认支付'; }
  }
}

const ORDER_STATUS_MAP = {
  'paid': '已完成',
  'pending': '待付款',
  'shipped': '待发货',
  'completed': '已完成',
};
const ORDER_TABS = [
  { key: 'pending', label: '待付款' },
  { key: 'shipped', label: '待发货' },
  { key: '', label: '全部' },
  { key: 'paid', label: '已完成' },
];

let ordersState = { tab: '', search: '', page: 1, total: 0, data: [], qqContact: '' };

async function renderOrders() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div style="text-align:center;padding:40px;color:#8b949e;">加载中...</div>';

  // Load site config for QQ
  try {
    const cfgRes = await API('/shop/config');
    if (cfgRes.status === 'ok') ordersState.qqContact = cfgRes.config.qq_contact || '';
  } catch (e) {}

  await loadOrders();
}

async function loadOrders() {
  const mc = document.getElementById('mainContent');
  const { tab, search, page } = ordersState;
  let url = `/shop/orders?page=${page}&page_size=20`;
  if (tab) url += `&status=${tab}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;

  const res = await API(url);
  ordersState.data = res.orders || [];
  ordersState.total = res.total || 0;

  let html = '<h3 style="color:#58a6ff;margin-bottom:16px;">📦 我的订单</h3>';

  // Tabs
  html += '<div class="order-tabs">';
  ORDER_TABS.forEach(t => {
    const active = t.key === tab ? ' active' : '';
    html += `<button class="order-tab${active}" onclick="switchOrderTab('${t.key}')">${t.label}</button>`;
  });
  html += '</div>';

  // Search
  html += `<div class="search-bar">
    <input type="text" id="orderSearch" placeholder="搜索订单号或商品名称..." value="${search.replace(/"/g,'&quot;')}" onkeydown="if(event.key==='Enter')searchOrders()">
    <button class="btn btn-primary btn-sm" onclick="searchOrders()">🔍 搜索</button>
    ${search ? '<button class="btn btn-sm" onclick="clearSearch()">✕ 清除</button>' : ''}
  </div>`;

  // Table
  if (!ordersState.data.length) {
    html += `<div class="empty-state"><div class="icon">📭</div><p>暂无${tab ? ORDER_STATUS_MAP[tab] || tab : ''}订单</p></div>`;
  } else {
    html += '<div style="overflow-x:auto;"><table class="order-table"><thead><tr>';
    html += '<th>宝贝</th><th>单价</th><th>数量</th><th>实际付款</th><th>交易状态</th><th>交易操作</th>';
    html += '</tr></thead><tbody>';

    ordersState.data.forEach(o => {
      const statusLabel = ORDER_STATUS_MAP[o.status] || o.status || '已完成';
      const statusCls = o.status === 'paid' || o.status === 'completed' ? 'status-completed' : 'status-unfinished';
      const hasDiscount = (o.discount_amount || 0) > 0;

      html += `<tr>
        <td>
          <div style="font-weight:600;color:#e6f1ff;">${escapeHtml(o.product_name)}</div>
          <div style="font-size:11px;color:#8b949e;">订单号: ${o.order_no || '#' + o.id}</div>
          ${o.promo_code ? `<span class="tag tag-yellow" style="font-size:10px;">${escapeHtml(o.promo_code)}</span>` : ''}
        </td>
        <td>¥${(o.unit_price || 0).toFixed(2)}</td>
        <td>x${o.quantity}</td>
        <td>
          <span style="color:#3fb950;font-weight:bold;">¥${(o.total_price || 0).toFixed(2)}</span>
          ${hasDiscount ? `<div style="font-size:11px;color:#d2991d;">优惠 -¥${(o.discount_amount||0).toFixed(2)}</div>` : ''}
        </td>
        <td>
          <span class="order-status ${statusCls}">${statusLabel}</span>
          <div class="action-links" style="margin-top:4px;">
            <a onclick="goToOrderDetail(${o.id})">📋 订单详情</a>
            ${ordersState.qqContact ? `<span class="divider">|</span><a class="btn-qq" href="https://wpa.qq.com/msgrd?v=3&uin=${ordersState.qqContact}&site=qq&menu=yes" target="_blank">🐧 联系客服</a>` : ''}
          </div>
        </td>
        <td>
          <button class="btn btn-sm btn-primary" onclick="rebuyProduct(${o.product_id},'${o.product_name.replace(/'/g,"\\'")}', ${(o.unit_price||0).toFixed(2)})">🔄 再次购买</button>
          <button class="btn btn-sm" style="margin-top:4px;" onclick="goToOrderDetail(${o.id})">👁️ 查看卡密</button>
        </td>
      </tr>`;
    });
    html += '</tbody></table></div>';

    // Pagination
    const totalPages = Math.ceil(ordersState.total / 20);
    if (totalPages > 1) {
      html += '<div class="pagination">';
      html += `<button class="page-btn" onclick="goPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹ 上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - page) <= 2) {
          html += `<button class="page-btn${i === page ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
        } else if (i === 2 || i === totalPages - 1) {
          html += '<span class="page-info">...</span>';
        }
      }
      html += `<button class="page-btn" onclick="goPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>下一页 ›</button>`;
      html += `<span class="page-info">共 ${ordersState.total} 条</span>`;
      html += '</div>';
    }
  }

  mc.innerHTML = html;
}

function switchOrderTab(key) {
  ordersState.tab = key;
  ordersState.page = 1;
  loadOrders();
}

function searchOrders() {
  ordersState.search = document.getElementById('orderSearch')?.value.trim() || '';
  ordersState.page = 1;
  loadOrders();
}

function clearSearch() {
  ordersState.search = '';
  ordersState.page = 1;
  loadOrders();
}

function goPage(p) {
  const totalPages = Math.ceil(ordersState.total / 20);
  if (p < 1 || p > totalPages) return;
  ordersState.page = p;
  loadOrders();
  document.getElementById('mainContent').scrollIntoView({ behavior: 'smooth' });
}

function rebuyProduct(id, name, price) {
  // Navigate to home and open buy modal
  switchTab('home');
  setTimeout(() => openBuy(id, name, parseFloat(price), 999), 300);
}

async function goToOrderDetail(orderId) {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div style="text-align:center;padding:40px;color:#8b949e;">加载中...</div>';

  const res = await API(`/shop/orders/${orderId}`);
  if (res.status !== 'ok') { mc.innerHTML = '<div class="empty-state"><p>订单不存在</p><button class="btn mt-16" onclick="switchTab(\'orders\')">← 返回订单列表</button></div>'; return; }

  const order = res.order;
  const cards = res.cards || [];
  const statusLabel = ORDER_STATUS_MAP[order.status] || order.status || '已完成';
  const hasDiscount = (order.discount_amount || 0) > 0;

  let html = '<div class="order-detail-header">';
  const orderDisplayNo = order.order_no || '#' + order.id;
  html += `<h3 style="color:#58a6ff;margin:0;">📋 订单详情 ${orderDisplayNo}</h3>`;
  html += '<button class="btn" onclick="switchTab(\'orders\')">← 返回订单列表</button>';
  html += '</div>';

  // Meta info
  html += '<div class="order-detail-meta">';
  html += `<div class="meta-item"><div class="meta-label">订单编号</div><div class="meta-value">${orderDisplayNo}</div></div>`;
  html += `<div class="meta-item"><div class="meta-label">商品名称</div><div class="meta-value" style="font-size:14px;">${escapeHtml(order.product_name)}</div></div>`;
  html += `<div class="meta-item"><div class="meta-label">交易状态</div><div class="meta-value" style="font-size:14px;"><span class="order-status status-completed">${statusLabel}</span></div></div>`;
  html += `<div class="meta-item"><div class="meta-label">购买数量</div><div class="meta-value">${order.quantity} 件</div></div>`;
  html += `<div class="meta-item"><div class="meta-label">单价</div><div class="meta-value" style="color:#3fb950;">¥${(order.unit_price || 0).toFixed(2)}</div></div>`;
  html += `<div class="meta-item"><div class="meta-label">实际付款</div><div class="meta-value" style="color:#3fb950;">¥${(order.total_price || 0).toFixed(2)}${hasDiscount ? ` <span style="font-size:11px;color:#d2991d;">(优惠¥${(order.discount_amount||0).toFixed(2)})</span>` : ''}</div></div>`;
  html += `<div class="meta-item"><div class="meta-label">创建时间</div><div class="meta-value" style="font-size:13px;">${order.created_at || '-'}</div></div>`;
  if (order.promo_code) {
    html += `<div class="meta-item"><div class="meta-label">优惠码</div><div class="meta-value" style="font-size:14px;"><span class="tag tag-yellow">${escapeHtml(order.promo_code)}</span></div></div>`;
  }
  html += '</div>';

  // Card list
  html += '<div class="card-list">';
  html += '<div class="card-list-header">';
  html += `<h4 style="color:#e6f1ff;margin:0;font-size:14px;">🎁 账号卡密 (共 ${cards.length} 条)</h4>`;
  html += '</div>';
  html += '<div class="card-list-body" id="cardListBody">';

  if (!cards.length) {
    html += '<p style="color:#8b949e;text-align:center;padding:20px;">暂无卡密数据</p>';
  } else {
    cards.forEach((c, i) => {
      const line = `${escapeHtml(c.account)}----${escapeHtml(c.password)}${c.recovery_email ? '----' + escapeHtml(c.recovery_email) : ''}`;
      html += `<div class="card-list-item">
        <span class="idx">${i + 1}.</span>
        <span class="content">${line}</span>
        <span class="copy-one" onclick="copySingleCard(${i})" title="复制此行">📋</span>
      </div>`;
    });
  }
  html += '</div>';
  html += '</div>';

  // Toolbar
  html += '<div class="toolbar">';
  html += `<button class="btn btn-primary" onclick="downloadAllCards(${order.id})">📥 下载全部</button>`;
  html += `<button class="btn" onclick="downloadSplitCards(${order.id})">📑 拆分下载</button>`;
  html += `<button class="btn" onclick="copyAllCards(${order.id})">📋 全部复制</button>`;
  html += '</div>';

  // Store cards data globally for download/copy functions
  window._orderDetailCards = cards;
  window._orderDetailOrder = order;

  html += '<button class="btn mt-16" onclick="switchTab(\'orders\')">← 返回订单列表</button>';

  mc.innerHTML = html;
}

function _formatCardLine(c) {
  return `${c.account}----${c.password}${c.recovery_email ? '----' + c.recovery_email : ''}`;
}

function _getOrderFileName(order, suffix) {
  const date = (order.created_at || '').replace(/[:\s]/g, '-').slice(0, 16);
  const no = order.order_no || order.id;
  return `订单${no}_${order.product_name}_${order.quantity}件_${date}${suffix || ''}.txt`;
}

function _downloadTxt(filename, content) {
  const bom = '﻿'; // UTF-8 BOM to prevent garbled characters
  const blob = new Blob([bom + content], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function downloadAllCards(orderId) {
  const cards = window._orderDetailCards || [];
  const order = window._orderDetailOrder || {};
  if (!cards.length) { alert('无卡密可下载'); return; }

  const lines = cards.map((c, i) => `${i + 1}. ${_formatCardLine(c)}`);
  const orderNo = order.order_no || ('#' + orderId);
  const content = `订单 ${orderNo} — ${order.product_name || ''}\n`;
  const content2 = `创建时间: ${order.created_at || '-'}\n`;
  const content3 = `数量: ${order.quantity || cards.length} 件 | 总价: ¥${(order.total_price || 0).toFixed(2)}\n`;
  const content4 = `${'='.repeat(50)}\n\n${lines.join('\n')}`;
  const filename = _getOrderFileName(order, '_全部');
  _downloadTxt(filename, content + content2 + content3 + content4);
}

function downloadSplitCards(orderId) {
  const cards = window._orderDetailCards || [];
  const order = window._orderDetailOrder || {};
  if (!cards.length) { alert('无卡密可下载'); return; }

  cards.forEach((c, i) => {
    const line = _formatCardLine(c);
    const orderNo = order.order_no || ('#' + orderId);
  const content = `订单 ${orderNo} — ${order.product_name || ''}\n`;
    const content2 = `序号: ${i + 1}/${cards.length}\n`;
    const content3 = `${'='.repeat(50)}\n\n账号: ${c.account}\n密码: ${c.password}${c.recovery_email ? '\n辅助邮箱: ' + c.recovery_email : ''}\n`;
    const filename = _getOrderFileName(order, `_${i + 1}`);
    // Small delay to allow multiple downloads
    setTimeout(() => _downloadTxt(filename, content + content2 + content3), i * 150);
  });
}

function copyAllCards(orderId) {
  const cards = window._orderDetailCards || [];
  if (!cards.length) { alert('无卡密可复制'); return; }

  const lines = cards.map((c, i) => `${i + 1}. ${_formatCardLine(c)}`);
  const text = lines.join('\n');

  navigator.clipboard.writeText(text).then(() => {
    // Show a brief toast
    const toast = document.createElement('div');
    toast.textContent = `✅ 已复制 ${cards.length} 条卡密`;
    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1b3a1b;color:#3fb950;padding:10px 24px;border-radius:8px;z-index:9999;font-size:14px;border:1px solid #238636;';
    document.body.appendChild(toast);
    setTimeout(() => { toast.remove(); }, 2000);
  }).catch(() => {
    // Fallback: select text in a textarea
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert(`已复制 ${cards.length} 条卡密`);
  });
}

function copySingleCard(idx) {
  const cards = window._orderDetailCards || [];
  const c = cards[idx];
  if (!c) return;
  const line = _formatCardLine(c);
  navigator.clipboard.writeText(line).then(() => {
    const el = document.querySelectorAll('.copy-one')[idx];
    if (el) { el.textContent = '✅'; setTimeout(() => { el.textContent = '📋'; }, 1200); }
  }).catch(() => {});
}

// Legacy support
async function copyOrder(id) {
  const res = await API(`/shop/orders/${id}`);
  if (res.status !== 'ok') return;
  const text = (res.cards || []).map(c => `账号: ${c.account}  密码: ${c.password}${c.recovery_email ? '  恢复: ' + c.recovery_email : ''}`).join('\n');
  navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板'));
}

async function renderAdminDashboard() {
  const mc = document.getElementById('mainContent');

  const res = await API('/shop/admin/dashboard');

  html += '<h4 style="color:#58a6ff;margin-bottom:10px;font-size:14px;">📅 今日概览</h4>';

    });
    html += '</tbody></table>';
  }

  mc.innerHTML = html;

// ── Bar chart helper ──
function _renderBarChart(values, labels, _maxVal) {
  if (!values.length) return '<p style="color:#8b949e;font-size:13px;">暂无数据</p>';
  const max = _maxVal || Math.max(...values, 1);
  let html = '<div class="bar-chart">';
  values.forEach((v, i) => {
    const pct = Math.max(2, Math.round((v / max) * 100));
    html += `<div class="bar-col">
      <span class="bar-val">${v > 0 ? v.toFixed ? v.toFixed(0) : v : ''}</span>
      <div class="bar" style="height:${pct}%" title="${labels[i]}: ${v}"></div>
      <span class="bar-label">${labels[i]||''}</span>
    </div>`;
  });
  html += '</div>';
  return html;
}

async function generateCards() {
  const amount = parseFloat(document.getElementById('genAmount').value);
  const count = parseInt(document.getElementById('genCount').value);
  const batch = document.getElementById('genBatch').value.trim();
  if (!amount || amount <= 0 || !count || count < 1) { alert('请填写有效的面额和数量'); return; }
  const res = await API('/shop/admin/cards/generate', {method:'POST', body:JSON.stringify({amount, count, batch})});
  if (res.status !== 'ok') { alert(res.detail || '生成失败'); return; }

  let resultHtml = `<div class="alert alert-success">${res.message}</div>`;
  resultHtml += '<div style="max-height:300px;overflow-y:auto;"><table class="table"><thead><tr><th>卡号</th><th>密码</th><th>面额</th></tr></thead><tbody>';
  (res.cards||[]).forEach(c => {
    resultHtml += `<tr><td style="font-family:monospace;">${c.card_no}</td><td style="font-family:monospace;">${c.card_password}</td><td>${c.amount}</td></tr>`;
  });
  resultHtml += '</tbody></table></div>';
  document.getElementById('genResult').innerHTML = resultHtml;
  loadCards();
}

async function loadCards() {
  const res = await API('/shop/admin/cards?page=1&page_size=100');

    html += `<tr>

async function exportCards() {
  const res = await API('/shop/admin/cards/export');
  if (res.status !== 'ok') { alert('导出失败'); return; }
  const bom = '﻿';
  const blob = new Blob([bom + res.data], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '充值卡密.txt';

async function loadProducts() {

async function createProduct() {
  const name = document.getElementById('prodName').value.trim();
  const description = document.getElementById('prodDesc').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value) || 0;
  if (!name) { alert('请输入商品名'); return; }
  const res = await API('/shop/admin/products', {method:'POST', body:JSON.stringify({name, description, price})});
  if (res.status === 'ok') {
    document.getElementById('prodResult').innerHTML = `<div class="alert alert-success">${res.message}</div>`;
    document.getElementById('prodName').value = '';
    document.getElementById('prodDesc').value = '';
    loadProducts();
  } else {
    document.getElementById('prodResult').innerHTML = `<div class="alert alert-error">${res.detail}</div>`;
  }
}

async function editProduct(id, oldName, oldPrice, oldCat) {
  const name = prompt('商品名', oldName);
  if (!name) return;
  const price = parseFloat(prompt('价格', oldPrice)) || 0;
  const description = prompt('描述', '') || '';
  const category_id = parseInt(prompt('分类ID (0=无)', oldCat)) || 0;
  const res = await API(`/shop/admin/products/${id}`, {method:'PUT', body:JSON.stringify({name, description, price, category_id})});
  if (res.status === 'ok') { loadProducts(); } else { alert(res.detail); }
}

async function deleteProduct(id, name) {
  if (!confirm(`⚠️ 永久删除\n\n"${name}" 及其全部库存将被永久删除，无法恢复！\n\n确认删除？`)) return;
  const res = await API(`/shop/admin/products/${id}`, {method:'DELETE'});
  if (res.status === 'ok') { alert(res.message); loadProducts(); }
  else { alert(res.detail || '删除失败'); }
}

async function toggleProduct(id) {
  const res = await API(`/shop/admin/products/${id}/toggle`, {method:'PUT'});
  if (res.status === 'ok') { loadProducts(); }
  else { alert(res.detail || '操作失败'); }
}

async function renderAdminInventory() {

async function loadInventory() {
  const { product_id, status, search, page } = invState;
  let url = `/shop/admin/inventory?product_id=${product_id}&status=${status}&page=${page}&page_size=50`;
  if (search) url += `&search=${encodeURIComponent(search)}`;
  const res = await API(url);
  invState.total = res.total || 0;
  const items = res.items || [];
  const soldCnt = res.sold || 0;
  const availCnt = res.available || 0;
  let html = `<p style="color:#8b949e;margin-bottom:8px;">共 ${invState.total} 条 | <span style="color:#3fb950;">可售 ${availCnt}</span> | <span style="color:#f85149;">已售 ${soldCnt}</span></p>`;
  html += '<table class="table"><thead><tr><th class="check-cell"><input type="checkbox" onchange="invToggleAll(this)" id="invCheckAll"></th><th>序号</th><th>账号</th><th>密码</th><th>恢复邮箱</th><th>状态</th><th>买家 / 订单</th><th>操作</th></tr></thead><tbody>';
  items.forEach((i, idx) => {
    const rowNum = (invState.page - 1) * 50 + idx + 1;
    const checked = invState.selected.has(i.id) ? ' checked' : '';
    const statusTag = i.status === 'available' ? '<span class="tag tag-green">可售</span>' : '<span class="tag tag-red">已售</span>';
    const buyerInfo = i.status === 'sold' && i.buyer_name
      ? `<div style="font-size:11px;"><b style="color:#e6f1ff;">${escapeHtml(i.buyer_name)}</b><br><span style="color:#8b949e;">${escapeHtml(i.order_no||'#'+i.order_id)}</span></div>`
      : '<span style="color:#8b949e;font-size:11px;">-</span>';
    html += `<tr>
      <td class="check-cell"><input type="checkbox" class="row-check"${checked} onchange="invToggle(${i.id}, this)" id="chk_inv_${i.id}"></td>
      <td style="color:#8b949e;font-size:11px;">${rowNum}</td>
      <td style="font-family:monospace;font-size:12px;cursor:pointer;" onclick="copyInvCell(this)" title="点击复制">${escapeHtml(i.account)}</td>
      <td style="font-family:monospace;font-size:12px;cursor:pointer;" onclick="copyInvCell(this)" title="点击复制">${escapeHtml(i.password)}</td>
      <td style="font-size:12px;">${escapeHtml(i.recovery_email||'-')}</td>
      <td>${statusTag}</td>
      <td>${buyerInfo}</td>
      <td><button class="btn btn-sm" onclick="copyInvRow(${i.id},'${escapeJs(i.account)}','${escapeJs(i.password)}','${escapeJs(i.recovery_email||'')}')">📋</button></td></tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('invList').innerHTML = html;

  // Pagination
  const totalPages = Math.ceil(invState.total / 50);
  let pageHtml = '';
  if (totalPages > 1) {
    pageHtml += '<div class="pagination">';
    pageHtml += `<button class="page-btn" onclick="invGoPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>‹</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - page) <= 2)
        pageHtml += `<button class="page-btn${i === page ? ' active' : ''}" onclick="invGoPage(${i})">${i}</button>`;
      else if (i === 2 || i === totalPages - 1) pageHtml += '<span class="page-info">...</span>';
    }
    pageHtml += `<button class="page-btn" onclick="invGoPage(${page + 1})" ${page >= totalPages ? 'disabled' : ''}>›</button>`;
    pageHtml += `<span class="page-info">共 ${invState.total} 条</span></div>`;
  }
  document.getElementById('invPagination').innerHTML = pageHtml;
}

function _invGetChecked() {
  const ids = [];
  document.querySelectorAll('#invList .row-check').forEach(c => { if (c.checked) ids.push(parseInt(c.id.replace('chk_inv_',''))); });
  return ids;
}
function _invUpdateCount() {
  const cnt = _invGetChecked().length;
  const el = document.getElementById('invSelCount');
  if (el) el.textContent = '已选 ' + cnt + ' 条';
}

function invToggle(id, cb) {
  if (cb.checked) invState.selected.add(id);
  else invState.selected.delete(id);
  _invUpdateCount();
}
function invToggleAll(cb) {
  document.querySelectorAll('#invList .row-check').forEach(c => {
    c.checked = cb.checked;
    const cid = parseInt(c.id.replace('chk_inv_',''));
    if (cb.checked) invState.selected.add(cid);
    else invState.selected.delete(cid);
  });
  if (!cb.checked) invState.selected.clear();
  _invUpdateCount();
}
function invSelectAll() {
  document.querySelectorAll('#invList .row-check').forEach(c => {
    c.checked = true;
    invState.selected.add(parseInt(c.id.replace('chk_inv_','')));
  });
  document.getElementById('invCheckAll').checked = true;
  _invUpdateCount();
}
function invSelectNone() {
  document.querySelectorAll('#invList .row-check').forEach(c => { c.checked = false; });
  invState.selected.clear();
  document.getElementById('invCheckAll').checked = false;
  _invUpdateCount();
}

async function invBatchAction(action, status = '') {
  const ids = _invGetChecked();
  if (!ids.length) { alert('请先勾选要操作的记录'); return; }
  const label = action === 'delete' ? '删除' : (status === 'available' ? '标记可售' : '标记已售');
  if (!confirm(`确认${label} ${ids.length} 条记录？此操作不可撤销。`)) return;
  const body = { ids, action };
  if (status) body.status = status;
  try {
    const res = await API('/shop/admin/inventory/batch', { method: 'POST', body: JSON.stringify(body) });
    if (res.status === 'ok') { loadInventory(); alert(res.message); }

function openPwd() { document.getElementById('pwdMsg').innerHTML=''; document.getElementById('oldPwd').value=''; document.getElementById('newPwd1').value=''; document.getElementById('newPwd2').value=''; document.getElementById('pwdModal').classList.add('show'); }
function closePwd() { document.getElementById('pwdModal').classList.remove('show'); }
function checkPwdStr() {
  const p = document.getElementById('newPwd1').value; const hint = document.getElementById('pwdHint');
  let types = 0;
  if (/[a-z]/.test(p)) types++; if (/[A-Z]/.test(p)) types++; if (/[0-9]/.test(p)) types++; if (/[^a-zA-Z0-9]/.test(p)) types++;
  if (p.length < 8) { hint.innerHTML='❌ 至少8个字符'; hint.style.color='#f85149'; }
  else if (types < 3) { hint.innerHTML=`⚠️ 已包含 ${types}/3 种字符`; hint.style.color='#d2991d'; }
  else { hint.innerHTML='✅ 密码强度合格'; hint.style.color='#3fb950'; }
}

async function doChangePwd() {
  const old_password = document.getElementById('oldPwd').value;
  const new_password = document.getElementById('newPwd1').value;
  const new_password2 = document.getElementById('newPwd2').value;
  if (!old_password||!new_password) { showMsg('pwdMsg','请填写完整','error'); return; }
  if (new_password !== new_password2) { showMsg('pwdMsg','两次密码不一致','error'); return; }
  if (new_password.length < 8) { showMsg('pwdMsg','新密码至少8位','error'); return; }
  let types = 0;
  if (/[a-z]/.test(new_password)) types++; if (/[A-Z]/.test(new_password)) types++; if (/[0-9]/.test(new_password)) types++; if (/[^a-zA-Z0-9]/.test(new_password)) types++;
  if (types < 3) { showMsg('pwdMsg','密码需包含大写、小写、数字、符号中至少3种','error'); return; }
  const res = await API('/shop/auth/change_password', {method:'POST', body:JSON.stringify({old_password, new_password})});
  if (res.status === 'ok') { showMsg('pwdMsg', res.message, 'success'); setTimeout(()=>{closePwd(); logout();},1500); }
  else { showMsg('pwdMsg', res.detail||'修改失败', 'error'); }
}

function userToggle(id, cb) {
  if (cb.checked) userState.selected.add(id); else userState.selected.delete(id);
  document.getElementById('batchSelCount').textContent = userState.selected.size;
}
function userToggleAll(cb) {
  document.querySelectorAll('[id^="uchk_"]').forEach(c => {
    c.checked = cb.checked;
    const id = parseInt(c.id.replace('uchk_',''));
    if (cb.checked) userState.selected.add(id); else userState.selected.delete(id);
  });
  document.getElementById('batchSelCount').textContent = userState.selected.size;
}

async function batchUserBalance() {
  const ids = Array.from(userState.selected);
  if (!ids.length) { alert('请先勾选用户'); return; }
  const action = document.getElementById('batchBalAction').value;
  const amount = parseFloat(document.getElementById('batchBalAmount').value) || 0;
  const reason = document.getElementById('batchBalReason').value.trim();
  if (amount < 0) { alert('金额不能为负数'); return; }
  if (amount === 0 && action !== 'set') { alert('金额必须大于0'); return; }
  if (!confirm(`确认对 ${ids.length} 个用户${action === 'add' ? '增加' : action === 'subtract' ? '扣除' : '设为'} ${amount.toFixed(2)} 元？`)) return;
  const res = await API('/shop/admin/users/batch/balance', { method: 'POST', body: JSON.stringify({ ids, action, amount, reason }) });
  if (res.status === 'ok') { userState.selected.clear(); renderAdminUsers(); alert(res.message); }
  else alert(res.detail || '操作失败');
}

  const res = await API(`/shop/admin/vip_prices?product_id=${pid}`);
  document.getElementById('vpVip1').value = ''; document.getElementById('vpVip2').value = ''; document.getElementById('vpSvip').value = '';
  (res.prices||[]).forEach(p => {
    if (p.vip_level==='vip1') document.getElementById('vpVip1').value = p.price;
    if (p.vip_level==='vip2') document.getElementById('vpVip2').value = p.price;
    if (p.vip_level==='svip') document.getElementById('vpSvip').value = p.price;
  });
}

async function saveVipPrices() {
  const pid = parseInt(document.getElementById('vpProduct').value);
  const prices = {};
  const v1 = parseFloat(document.getElementById('vpVip1').value);
  const v2 = parseFloat(document.getElementById('vpVip2').value);
  const sv = parseFloat(document.getElementById('vpSvip').value);
  if (!isNaN(v1) && v1 >= 0) prices.vip1 = v1;
  if (!isNaN(v2) && v2 >= 0) prices.vip2 = v2;
  if (!isNaN(sv) && sv >= 0) prices.svip = sv;
  if (!Object.keys(prices).length) { alert('至少填一个价格'); return; }
  const res = await API('/shop/admin/vip_prices', {method:'PUT', body:JSON.stringify({product_id: pid, prices})});
  document.getElementById('vpResult').innerHTML = res.status==='ok' ? `<div class="alert alert-success">${res.message}</div>` : `<div class="alert alert-error">${res.detail}</div>`;
}

// ═══════════════════════════════════════════════════
// Admin: 站点配置
// ═══════════════════════════════════════════════════
async function renderAdminConfig() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div style="text-align:center;padding:40px;color:#8b949e;">加载中...</div>';

  const res = await API('/shop/admin/config');
  const cfg = res.config || {};

  let html = '<h3 style="color:#d2991d;margin-bottom:16px;">⚙️ 站点配置</h3>';
  html += '<div class="card"><h3>联系客服</h3>';
  html += '<div class="form-group"><label>QQ 号码（用户端点击直接打开QQ聊天）</label>';
  html += `<input type="text" id="cfgQqContact" value="${cfg.qq_contact || ''}" placeholder="填写QQ号码，留空则不显示客服入口">`;
  html += '</div>';
  html += '<div class="form-group"><label>客服按钮文字</label>';
  html += `<input type="text" id="cfgQqText" value="${cfg.qq_contact_text || '联系客服'}" placeholder="联系客服">`;
  html += '</div>';
  html += '<div id="cfgMsg"></div>';
  html += '<button class="btn btn-primary" onclick="saveConfig()">💾 保存配置</button>';
  html += '</div>';

  html += '<div class="card mt-16"><h3>站点公告</h3>';
  html += '<div class="form-group"><label>公告内容（支持 HTML）</label>';
  html += `<textarea id="cfgNotice" placeholder="留空则不显示公告">${cfg.site_notice || ''}</textarea>`;
  html += '</div>';
  html += '<button class="btn btn-primary" onclick="saveConfigNotice()">💾 保存公告</button>';
  html += '</div>';

  mc.innerHTML = html;
}

async function saveConfig() {
  const qq = document.getElementById('cfgQqContact').value.trim();
  const text = document.getElementById('cfgQqText').value.trim() || '联系客服';
  let errs = [];

  let res = await API('/shop/admin/config', {method:'PUT', body:JSON.stringify({key:'qq_contact', value:qq})});
  if (res.status !== 'ok') errs.push('QQ号码保存失败');

  res = await API('/shop/admin/config', {method:'PUT', body:JSON.stringify({key:'qq_contact_text', value:text})});
  if (res.status !== 'ok') errs.push('按钮文字保存失败');

  if (errs.length) {
    document.getElementById('cfgMsg').innerHTML = `<div class="alert alert-error">${errs.join('<br>')}</div>`;
  } else {
    document.getElementById('cfgMsg').innerHTML = '<div class="alert alert-success">✅ 配置已保存</div>';
    // Refresh orders state
    ordersState.qqContact = qq;
    setTimeout(() => { document.getElementById('cfgMsg').innerHTML = ''; }, 2000);
  }
}

async function saveConfigNotice() {
  const notice = document.getElementById('cfgNotice').value.trim();
  const res = await API('/shop/admin/config', {method:'PUT', body:JSON.stringify({key:'site_notice', value:notice})});
  alert(res.status === 'ok' ? '保存成功' : (res.detail || '保存失败'));
}

// ═══════════════════════════════════════════════════
// Admin: 审计日志
// ═══════════════════════════════════════════════════
let auditState = { page: 1, total: 0 };

async function renderAdminAudit() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<div style="text-align:center;padding:40px;color:#8b949e;">加载中...</div>';
  await loadAuditLog();
}

async function loadAuditLog() {
  const res = await API(`/shop/admin/audit_log?page=${auditState.page}&page_size=50`);
  const logs = res.logs || [];
  auditState.total = res.total || 0;
  const total = auditState.total;

  let html = '<h3 style="color:#d2991d;margin-bottom:16px;">📝 审计日志</h3>';
  html += '<p style="color:#8b949e;font-size:13px;margin-bottom:12px;">记录所有管理员操作（余额变更、库存变更等）</p>';

  if (!logs.length) {
    html += '<div class="empty-state"><p>暂无审计日志</p></div>';
  } else {
    html += '<table class="table"><thead><tr><th>时间</th><th>操作人</th><th>操作</th><th>目标</th><th>详情</th></tr></thead><tbody>';
    logs.forEach(l => {
      const actionLabel = { balance_set: '设置余额', balance_add: '增加余额', balance_subtract: '扣除余额',
        batch_delete_inventory: '批量删除库存', batch_set_inventory_status: '批量改库存状态' }[l.action] || l.action;
      const targetLabel = l.target_type === 'user' ? `用户#${l.target_id}` : l.target_type === 'inventory' ? `库存` : '';
      html += `<tr>
        <td style="font-size:11px;">${l.created_at||''}</td>
        <td>${escapeHtml(l.admin_name||'#'+l.admin_id)}</td>
        <td>${actionLabel}</td>
        <td>${targetLabel}</td>
        <td style="font-size:12px;">${escapeHtml(l.detail||'-')}</td></tr>`;
    });
    html += '</tbody></table>';

    // Pagination
    const tp = Math.ceil(total / 50);
    if (tp > 1) {
      html += '<div class="pagination">';
      html += `<button class="page-btn" onclick="auditGoPage(${auditState.page - 1})" ${auditState.page <= 1 ? 'disabled' : ''}>‹</button>`;
      for (let i = 1; i <= tp; i++) {
        if (i === 1 || i === tp || Math.abs(i - auditState.page) <= 2)
          html += `<button class="page-btn${i === auditState.page ? ' active' : ''}" onclick="auditGoPage(${i})">${i}</button>`;
        else if (i === 2 || i === tp - 1) html += '<span class="page-info">...</span>';
      }
      html += `<button class="page-btn" onclick="auditGoPage(${auditState.page + 1})" ${auditState.page >= tp ? 'disabled' : ''}>›</button>`;
      html += `<span class="page-info">共 ${total} 条</span></div>`;
    }
  }

  document.getElementById('mainContent').innerHTML = html;
}

function auditGoPage(p) {
  const tp = Math.ceil(auditState.total / 50);
  if (p < 1 || p > tp) return;
  auditState.page = p;
  loadAuditLog();
}

init();
